<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はらぺこ文庫 おはなしの時間</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2a2118;
  --paper: #faf7f2;
  --paper2: #f3ede3;
  --sage: #7a9e7e;
  --sage-light: #e8f0e8;
  --brown: #8b6f47;
  --brown-light: #f0e8dc;
  --cream: #fffdf9;
  --muted: #9a8f82;
  --border: #ddd5c8;
  --ehon: #5b7fa6;
  --ehon-light: #e8eef5;
  --teasobi: #c07a2a;
  --teasobi-light: #fef3e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; }

/* ── グレードット背景 ── */
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  background-color: #dedad4;
  background-image: radial-gradient(circle, #bbb6af 1.5px, transparent 1.5px);
  background-size: 18px 18px;
  padding: 32px 20px 48px;
}

/* ── 白いカード ── */
.app-card {
  position: relative;
  display: flex;
  width: 100%;
  max-width: 1180px;
  min-height: calc(100vh - 80px);
  background: #faf7f2;
  border-radius: 18px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.1);
  overflow: visible;
  margin: 0 auto;
}

/* ── サイドバー ── */
.sidebar { display: none; }
.sidebar-date { display: none; }

/* ── コンテンツ ── */
.content-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--cream); }

/* ── タイトルバナー（カード右上・ヘッダー突き抜け） ── */
.app-title-banner { display: none; }
.dash-title-col { position: absolute; top: -20px; right: 24px; z-index: 20; pointer-events: none; }
.dash-title-img { display: block; width: 100px; height: auto; }

/* ── ナビ ── */
.nav { display: flex; gap: 4px; padding: 0.6rem 1.5rem; background: transparent; border-bottom: 1px solid var(--border); overflow-x: auto; align-items: center; }
.navbtn { padding: 5px 16px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.navbtn:hover { background: var(--paper2); color: var(--ink); }
.navbtn.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }

.main { padding: 1.5rem 3rem 2rem; flex: 1; }
.view { display: none; }
.view.on { display: block; }

/* ── ダッシュボード（カレンダービューのトップ） ── */
.dashboard { display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px; margin-bottom: 24px; padding: 0 16px; }
.dash-left-col { display: flex; flex-direction: column; gap: 20px; padding: 8px 40px; }
.dash-title-col { display: flex; align-items: flex-start; justify-content: center; }

/* タスクパネル */
.dash-task-panel { background: rgba(255,255,255,0.75); border-radius: 12px; padding: 16px 18px; }
.dash-task-title { margin-bottom: 12px; }
.dash-task-title img { display: block; width: auto; height: auto; max-width: 100%; }
.dash-task-list { display: flex; flex-direction: column; gap: 8px; }
.dash-task-item { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink); cursor: pointer; border-radius: 8px; padding: 5px 6px; transition: background 0.1s; }
.dash-task-item:hover { background: var(--paper2); }
.dash-task-item input[type=checkbox] { accent-color: var(--brown); flex-shrink: 0; width: 16px; height: 16px; cursor: default; }
.dash-task-item img { width: 26px !important; height: 26px !important; }
.dash-task-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.dash-task-item.done span { text-decoration: line-through; color: var(--muted); }
.dash-task-edit { display: flex; flex-direction: column; gap: 5px; padding: 8px; background: var(--paper2); border-radius: 8px; border: 1px solid var(--border); margin: 2px 0; }
.dash-task-edit input, .dash-task-edit select { font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 100%; }
.dash-task-edit-btns { display: flex; gap: 6px; }
.dash-task-edit-save { flex: 1; font-size: 11px; padding: 5px; border: none; border-radius: 6px; background: var(--ink); color: var(--cream); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.dash-task-edit-cancel { font-size: 11px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.dash-task-add-toggle { display: flex; justify-content: center; margin-top: 12px; }
.dash-task-add-toggle-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.dash-task-add-toggle-btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.dash-task-add { display: none; margin-top: 10px; padding: 12px; background: var(--paper2); border-radius: 10px; border: 1px solid var(--border); flex-direction: column; gap: 6px; }
.dash-task-add.open { display: flex; }
.dash-task-add input, .dash-task-add select { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 100%; }
.dash-task-add-btn { font-size: 12px; padding: 6px 10px; border: none; border-radius: 6px; background: var(--ink); color: var(--cream); cursor: pointer; width: 100%; font-family: 'Noto Sans JP', sans-serif; }
.dash-task-add-btn:hover { opacity: 0.85; }

/* 今週のプログラム */
.dash-program-wrap { display: flex; align-items: flex-start; justify-content: center; padding: 8px 80px 8px 0; }
.dash-program-frame { position: relative; display: inline-block; }
.dash-program-bg { display: block; width: auto; height: auto; max-width: 100%; }
.dash-program-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18% 12% 10%; overflow-y: auto; }
.dash-program-label { text-align: center; font-family: 'Zen Kurenaido', serif; font-size: 14px; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.05em; }
.dash-prog-item { text-align: center; margin-bottom: 10px; width: 100%; font-family: 'Zen Kurenaido', serif; }
.dash-prog-item:last-child { margin-bottom: 0; }

/* ミニカレンダー */
.dash-mini-cal { background: rgba(255,255,255,0.75); border-radius: 12px; padding: 10px 12px; }
.dash-mini-cal-head { font-size: 13px; font-family: 'Zen Kurenaido', serif; color: var(--ink); margin-bottom: 6px; }
.dash-mini-dow { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 8px; color: var(--muted); margin-bottom: 3px; }
.dash-mini-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
.dash-mini-day { text-align: center; font-size: 9px; padding: 2px 1px; border-radius: 3px; line-height: 1.4; color: var(--ink); }
.dash-mini-day.blank { }
.dash-mini-day.today { background: var(--brown); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
.dash-mini-day.has-rec { font-weight: 600; color: var(--brown); }
.dash-mini-day.past { color: #bbb; }
.dash-mini-day.sun { color: #c0392b; }
.dash-mini-day.sat { color: #2980b9; }
.dash-mini-day.today.sun, .dash-mini-day.today.sat { color: #fff; }

/* TODO ヘッダーバー（サイドバー移行につき非表示） */
.header { display: none; }
.todo-toggle-btn { display: none; }
.todo-speaker { display: none; }
.todo-bubbles { display: none; }
.todo-bubble { display: none; }
.todo-bubble-icon { display: none; }
.todo-bubble-more { display: none; }
.header-count { display: none; }

/* 曜日ビュー */
.dow-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
.dow-day-block { display: flex; flex-direction: column; gap: 10px; }
.dow-day-label { font-family: 'Zen Kurenaido', serif; font-size: 16px; color: var(--ink); padding-bottom: 6px; border-bottom: 2px solid var(--border); margin-bottom: 2px; }
.dow-col { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--cream); }
.dow-head { padding: 7px 12px; font-size: 11px; font-weight: 500; background: var(--paper2); color: var(--muted); border-bottom: 1px solid var(--border); }
.dow-head.has-k { background: var(--sage-light); color: #3d6b41; }
.dow-head.has-e { background: var(--ehon-light); color: #2d5a8a; }
.dow-head.has-t { background: var(--teasobi-light); color: #8a4f10; }
.dow-body { padding: 6px 10px; }
.dow-title-item { font-size: 12px; color: var(--ink); padding: 5px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
.dow-title-item:last-child { border-bottom: none; padding-bottom: 0; }
.dow-empty { font-size: 11px; color: var(--border); text-align: center; padding: 12px 0; }

.badge-k { background: var(--sage-light); color: #3d6b41; }
.badge-e { background: var(--ehon-light); color: #2d5a8a; }
.badge-t { background: var(--teasobi-light); color: #8a4f10; }
.prog-badge { display:inline-block; font-size:9px; padding:1px 5px; border-radius:10px; flex-shrink:0; white-space:nowrap; }

/* 回数順 */
.ctrl { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.ctrl select, .ctrl input { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.num-item { border: 1px solid var(--border); border-radius: 10px; background: var(--cream); margin-bottom: 10px; overflow: hidden; }
.num-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--paper2); }
.num-badge { font-family: 'Zen Kurenaido', serif; font-size: 13px; color: var(--brown); background: var(--brown-light); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.num-date { font-size: 13px; color: var(--ink); }
.num-dow { font-size: 11px; color: var(--muted); }
.num-body { padding: 10px 16px; }
.num-prog { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.num-prog:last-child { border-bottom: none; padding-bottom: 0; }
.num-prog-badge { font-size: 10px; padding: 2px 0; border-radius: 10px; flex-shrink: 0; margin-top: 2px; width: 4.5em; text-align: center; display: inline-block; }
.num-prog-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.num-prog-credit { font-size: 12px; color: var(--muted); margin-top: 2px; }
.num-prog-reader { font-size: 12px; color: var(--brown); margin-top: 1px; }

/* テーブル */
.tbl-wrap { overflow-x: auto; }
table.srch-tbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
table.srch-tbl th { background: var(--paper2); color: var(--muted); font-weight: 500; font-size: 11px; padding: 7px 10px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
table.srch-tbl td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; background: var(--cream); line-height: 1.5; overflow: hidden; display: table-cell; }
table.srch-tbl tr:hover td { background: var(--paper2); }
.tbl-num { color: var(--brown); font-size: 11px; white-space: nowrap; }
.tbl-date { color: var(--muted); font-size: 11px; white-space: nowrap; }
.tbl-title { font-weight: 500; color: var(--ink); }
.tbl-credit { color: var(--muted); font-size: 11px; }
.tbl-reader { color: var(--brown); font-size: 11px; }
.hl { background: #ffeebb; border-radius: 2px; padding: 0 1px; }
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }
.reslabel { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

/* カレンダー */
.cal-year-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 30px; height: 30px; font-size: 13px; cursor: pointer; color: var(--ink); display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.cal-year-btn:hover { background: var(--paper2); }
.cal-year-label { font-family: 'Zen Kurenaido', serif; font-size: 22px; color: var(--ink); letter-spacing: 0.08em; min-width: 80px; text-align: center; }
.cal-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; }
.cal-month { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--cream); }
.cal-month-head { padding: 7px 12px; font-size: 13px; font-weight: 500; color: var(--ink); background: #e8dfd4; border-bottom: 1px solid var(--border); font-family: 'Zen Kurenaido', serif; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--paper2); border-bottom: 1px solid var(--border); }
.cal-dow-cell { text-align: center; font-size: 10px; color: var(--muted); padding: 3px 0; }
.cal-dow-cell.sun { color: #c0392b; }
.cal-dow-cell.sat { color: #2980b9; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 52px; }
.cal-day { height: 52px; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 3px 2px; position: relative; overflow: hidden; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.blank { background: #f8f4ef; }
.cal-day.today .cal-day-num { background: var(--brown); color: #fff; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.cal-day-num { font-size: 10px; color: var(--muted); line-height: 1.6; text-align: center; }
.cal-day-num.sun { color: #c0392b; }
.cal-day-num.sat { color: #2980b9; }
.cal-dot { width: 6px; height: 6px; border-radius: 50%; margin: 2px auto 0; }
.cal-dot.done { background: #b4b2a9; }
.cal-dot.future { background: #e8c87a; }
.cal-day.has-event { cursor: pointer; }
.cal-day.has-event:hover { background: var(--paper2) !important; }
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { background: #f0f5f0 !important; }
.cal-day.past-done { background: #f8f4ef !important; }
.cal-day.past-done:hover { background: #ede9e3 !important; }
.cal-kyugyo { font-size: 7px; text-align: center; color: #c0392b; font-weight: 500; margin-top: 1px; line-height: 1.2; }
.cal-kyugyo-kari { }
.cal-popup { display: none; position: fixed; z-index: 1000; background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; width: 300px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); pointer-events: none; }
.cal-popup.show { display: block; }
.cal-popup-head { font-size: 12px; font-weight: 500; color: var(--brown); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
.cal-popup-prog { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; }
.cal-popup-prog:last-child { margin-bottom: 0; }
.cal-popup-badge { display: inline-block; font-size: 9px; padding: 1px 0; border-radius: 10px; flex-shrink: 0; width: 4.5em; text-align: center; }
.cal-popup-body { flex: 1; }
.cal-popup-title { font-size: 12px; font-weight: 500; color: var(--ink); }
.cal-popup-reader { font-size: 11px; color: var(--brown); }
.cal-popup-session { font-size: 10px; color: var(--muted); margin: 6px 0 3px; border-top: 0.5px solid var(--border); padding-top: 4px; }
.cal-edit-hint { font-size: 10px; color: var(--muted); margin-top: 8px; padding-top: 6px; border-top: 0.5px solid var(--border); text-align: center; }

/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--cream); border-radius: 12px; width: min(620px, 100%); max-height: calc(100vh - 48px); overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.22); display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--cream); z-index: 1; }
.modal-header-title { font-family: 'Zen Kurenaido', serif; font-size: 16px; color: var(--ink); }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; }
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 16px 18px; flex: 1; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 12px 18px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--cream); }
.form-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.form-group label { font-size: 12px; color: var(--muted); width: 4em; flex-shrink: 0; }
.form-group input[type="date"],
.form-group input[type="number"],
.form-group input[type="text"] { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--paper); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.form-group input[type="date"] { width: 10em; }
.form-group input[type="number"] { width: 5em; }
.dow-tag { font-size: 12px; color: var(--brown); background: var(--brown-light); padding: 3px 10px; border-radius: 20px; }
.form-section-head { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; color: var(--ink); margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.add-prog-btn { font-size: 12px; padding: 4px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); color: var(--ink); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.add-prog-btn:hover { background: var(--paper2); }
.prog-row { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; background: var(--paper); display: flex; gap: 8px; align-items: flex-start; position: relative; transition: opacity 0.15s; }
.prog-row.dragging { opacity: 0.35; }
.prog-row.drop-above::before { content: ''; position: absolute; top: -3px; left: 0; right: 0; height: 3px; background: var(--brown); border-radius: 2px; z-index: 10; }
.prog-row.drop-below::after  { content: ''; position: absolute; bottom: -3px; left: 0; right: 0; height: 3px; background: var(--brown); border-radius: 2px; z-index: 10; }
.prog-drag-handle { cursor: grab; color: var(--border); font-size: 16px; padding-top: 6px; flex-shrink: 0; user-select: none; line-height: 1; }
.prog-drag-handle:active { cursor: grabbing; }
.prog-row-body { flex: 1; min-width: 0; }
.prog-row-top { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.prog-type-sel, .prog-session-sel { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.prog-remove { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
.prog-remove:hover { color: #c0392b; }
.prog-fields { display: flex; flex-direction: column; gap: 6px; }
.prog-fields input { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 100%; }
.prog-extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.prog-extra-grid.hidden { display: none; }
.btn-cancel { font-size: 13px; padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.btn-cancel:hover { background: var(--paper2); color: var(--ink); }
.btn-save { font-size: 13px; padding: 8px 20px; border: none; border-radius: 8px; background: var(--ink); color: var(--cream); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.btn-save:hover { opacity: 0.85; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-delete { font-size: 13px; padding: 8px 18px; border: 1px solid #c0392b; border-radius: 8px; background: transparent; color: #c0392b; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.btn-delete:hover { background: #c0392b; color: #fff; }
.save-note { font-size: 11px; color: var(--muted); margin-right: auto; align-self: center; }

/* TODO */
.todo-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; margin-left: auto; }
.todo-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--cream); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px 3px 6px; font-size: 11px; color: var(--ink); white-space: nowrap; cursor: default; }
.todo-chip.overdue { border-color: #c0392b; background: #fff5f5; color: #c0392b; }
.todo-chip.today   { border-color: #c07a2a; background: #fff9f0; color: #c07a2a; }
.todo-assignee-icon { display: inline-block; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; line-height: 18px; text-align: center; color: #fff; flex-shrink: 0; }
.todo-open-btn { background: none; border: none; font-size: 11px; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 12px; border: 1px solid var(--border); white-space: nowrap; }
.todo-open-btn:hover { background: var(--paper2); color: var(--ink); }

.todo-panel { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.todo-panel-title { font-family: 'Zen Kurenaido', serif; font-size: 15px; color: var(--ink); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.todo-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.todo-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--paper); border-radius: 8px; border: 1px solid var(--border); font-size: 12px; }
.todo-item.done { opacity: 0.45; }
.todo-item-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.todo-item-due { font-size: 11px; color: var(--muted); white-space: nowrap; }
.todo-item.overdue .todo-item-due { color: #c0392b; font-weight: 600; }
.todo-item.today-due .todo-item-due { color: #c07a2a; font-weight: 600; }
.todo-item-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
.todo-item-del:hover { color: #c0392b; }
.todo-add-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.todo-add-form input, .todo-add-form select { font-size: 12px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 7px; background: var(--paper); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.todo-add-form input[name=text] { flex: 1; min-width: 140px; }
.todo-add-form input[name=due]  { width: 130px; }
.todo-add-btn { font-size: 12px; padding: 6px 14px; border: none; border-radius: 7px; background: var(--ink); color: var(--cream); cursor: pointer; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }
.todo-add-btn:hover { opacity: 0.85; }

/* 時間帯チェックボックス */
.times-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.times-chip { position: relative; }
.times-chip input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
.times-chip label { display: block; font-size: 12px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.times-chip input:checked + label { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.times-custom-input { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 5em; }

/* 書籍検索 */
.prog-search-btn { font-size: 14px; padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); cursor: pointer; flex-shrink: 0; line-height: 1; }
.prog-search-btn:hover { background: var(--paper2); }

.footer { text-align: center; padding: 2rem; font-size: 11px; color: var(--border); }

@media (max-width: 640px) {
  body { padding: 0; }
  .app-card { border-radius: 0; min-height: 100vh; }
  .dashboard { grid-template-columns: 1fr; }
  .nav { padding: 0.5rem 0.75rem; gap: 6px; }
  .navbtn { padding: 5px 10px; font-size: 11px; }
  .main { padding: 0.75rem 0.75rem; }
  .dow-grid { grid-template-columns: 1fr; gap: 20px; }
  .num-head { flex-wrap: wrap; gap: 4px; }
  .num-badge { font-size: 11px; }
  .num-date { font-size: 12px; }
  .cal-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  .cal-month-head { font-size: 12px; padding: 5px 8px; }
  .cal-day { height: 44px; }
  .cal-days { grid-auto-rows: 44px; }
  .cal-day-num { font-size: 9px; }
  .cal-popup { width: calc(100vw - 32px); left: 16px !important; }
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.srch-tbl { font-size: 11px; table-layout: auto; }

  .save-note { display: none; }
}

<body>

<div class="header"><div class="header-count" id="hcount"></div></div>

<div class="app-card">

<!-- サイドバー -->
<div class="sidebar">
  <img src="title.png" alt="はらぺこ文庫 おはなしの時間" class="sidebar-title-img">
  <div class="sidebar-date" id="sidebar-date"></div>
</div>

<!-- コンテンツ -->
<div class="content-wrap">
  <div class="nav">
    <button class="navbtn on" onclick="sw('top',this)">TOP</button>
    <button class="navbtn" onclick="sw('cal',this)">年間カレンダー</button>
    <button class="navbtn" onclick="sw('num',this)">開催情報</button>
    <button class="navbtn" onclick="sw('dow',this)">曜日ごと作品</button>
    <button class="navbtn" onclick="sw('srch',this)">データ一覧／検索</button>
  </div>

  <div class="main">

  <!-- 曜日ビュー -->
  <div class="view" id="v-dow">
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--border)"></span>グレーのタイトルは実施予定
    </div>
    <div class="dow-grid" id="dow-grid"></div>
  </div>

  <!-- 回数順 -->
  <div class="view" id="v-num">
    <div class="ctrl">
      <select id="num-dow" onchange="renderNum()">
        <option value="">曜日：すべて</option>
        <option>水曜日</option><option>木曜日</option><option>金曜日</option>
      </select>
      <select id="num-type" onchange="renderNum()">
        <option value="">種別：すべて</option>
        <option value="katarite">おはなし</option>
        <option value="ehon">絵本</option>
        <option value="teasobi">てあそび</option>
      </select>
    </div>
    <div id="num-list"></div>
  </div>

  <!-- テーブルビュー -->
  <div class="view" id="v-srch">
    <div class="ctrl">
      <input type="text" id="srch-q" placeholder="タイトル・作者・話し手で検索…" oninput="renderSrch()" style="flex:1;min-width:200px">
      <select id="srch-dow" onchange="renderSrch()">
        <option value="">曜日：すべて</option>
        <option>水曜日</option><option>木曜日</option><option>金曜日</option>
      </select>
      <select id="srch-type" onchange="renderSrch()">
        <option value="">種別：すべて</option>
        <option value="katarite">おはなし</option>
        <option value="ehon">絵本</option>
        <option value="teasobi">てあそび</option>
      </select>
    </div>
    <div id="srch-label" class="reslabel"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">※「話し手」は漢字名でもプレクラネームでも検索できます</div>
    <div class="tbl-wrap">

        <thead>
          <tr>
            <th style="width:3em">回</th>

            <th style="width:4em">曜日</th>
            <th style="width:7em">種別</th>
            <th style="width:25%">タイトル</th>
            <th style="width:10%">出典</th>
            <th style="width:10%">作者</th>
            <th style="width:10%">訳・編</th>
            <th style="width:10%">絵</th>

        </thead>

      </table>
    </div>
  </div>

  <!-- TOP ダッシュボード -->
  <div class="view on" id="v-top">
    <div class="dashboard">
      <!-- 左列：タスク＋ミニカレンダー -->
      <div class="dash-left-col">
        <div class="dash-task-panel">
          <div class="dash-task-title"><img src="task.png" alt="タスク"></div>
          <div class="dash-task-list" id="dash-task-list"></div>
          <div class="dash-task-add-toggle">
            <button class="dash-task-add-toggle-btn" onclick="toggleTaskAddForm()" id="task-add-toggle-btn" title="タスクを追加">＋</button>
          </div>
          <div class="dash-task-add" id="dash-task-add-form">
            <input id="dash-todo-text" type="text" placeholder="タスクを追加…" onkeydown="if(event.key==='Enter')event.preventDefault()">
            <input id="dash-todo-due"  type="date">
            <select id="dash-todo-assignee"><option value="">担当者</option></select>
            <button class="dash-task-add-btn" onclick="addDashTodo()">＋ 追加</button>
          </div>
        </div>
        <!-- ミニカレンダー -->
        <div id="dash-mini-cal-wrap"></div>
      </div>

      <!-- 中央列：今週のプログラム -->
      <div class="dash-program-wrap">
        <div class="dash-program-frame">
          <img src="program.png" alt="" class="dash-program-bg">
          <div class="dash-program-inner">
            <div class="dash-program-label">今週のプログラム</div>
            <div id="dash-program-body"></div>
          </div>
        </div>
      </div>

      <!-- 右列：タイトル画像 -->
      <div class="dash-title-col">
        <img src="title.png" alt="はらぺこ文庫 おはなしの時間" class="dash-title-img">
      </div>
    </div>
  </div>

  <!-- 年間カレンダー -->
  <div class="view" id="v-cal">
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:1.2rem">
      <button class="cal-year-btn" onclick="changeCalYear(-1)">◀</button>
      <span class="cal-year-label" id="cal-year-label">2026</span>
      <button class="cal-year-btn" onclick="changeCalYear(1)">▶</button>
    </div>
    <div id="cal-grid"></div>
  </div>

  <!-- TODOパネル（互換性のため残す・非表示） -->
  <div class="todo-panel" id="todo-panel" style="display:none">
    <div class="todo-list" id="todo-list"></div>
    <div class="todo-add-form">
      <input id="todo-text" type="text"><input id="todo-due" type="date">
      <select id="todo-assignee"><option value="">担当者</option></select>
      <button onclick="addTodo()">追加</button>

  </div><!-- .main -->
</div><!-- .content-wrap -->

</div><!-- .app-card -->

<div class="cal-popup" id="cal-popup"></div>
<datalist id="readers-list">
  <option value="まるちゃん">
  <option value="かなえちゃん">
  <option value="そねちゃん">
  <option value="ちゃこさん">

  <option value="おりちゃん">
  <option value="おおさん">
</datalist>

<!-- 入力モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title" id="modal-title">記録を入力</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="f-date" onchange="onDateChange()">
        <span class="dow-tag" id="f-dow-tag" style="display:none"></span>
      </div>
      <div class="form-group">
        <label>開催回</label>
        <input type="number" id="f-num" min="1" placeholder="回数を入力">
        <span style="font-size:12px;color:var(--muted)">回</span>
      </div>
      <div class="form-group" style="align-items:flex-start">
        <label style="padding-top:5px">時間帯</label>
        <div class="times-chips" id="f-times-group">
          <span class="times-chip"><input type="checkbox" id="tc1" value="10:00"><label for="tc1">10:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc2" value="15:00"><label for="tc2">15:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc3" value="17:00"><label for="tc3">17:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc4" value="17:45"><label for="tc4">17:45</label></span>
          <span class="times-chip"><input type="checkbox" id="tc5" value="18:00"><label for="tc5">18:00</label></span>
          <input type="text" class="times-custom-input" id="f-times-custom" placeholder="その他">

        プログラム
        <button class="add-prog-btn" onclick="addProgRow(null)">＋ 追加</button>
      </div>
      <div id="prog-rows"></div>

      <button class="btn-delete" id="btn-delete" onclick="deleteRecord()" style="display:none">削除する</button>
      <span style="flex:1"></span>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveRecord()">保存する</button>
    </div>

<script>
const EIGYO = ['水曜日','木曜日','金曜日'];
const ALLDAYS = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const SHORT = {水曜日:'水',木曜日:'木',金曜日:'金'};
const TYPE_LABEL = {katarite:'おはなし', ehon:'絵本', teasobi:'てあそび'};
const TYPE_CLASS = {katarite:'badge-k', ehon:'badge-e', teasobi:'badge-t'};
const EIGYO_DOW = new Set([3, 4, 5]); // 水=3 木=4 金=5
const READERS = ['まるちゃん','かなえちゃん','そねちゃん','ちゃこさん','しーちゃん','おりちゃん','おおさん'];
const KNOWN_TIMES = ['10:00','15:00','17:00','17:45','18:00'];

// 休業日
const KYUGYO = new Set([
  '2026-08-12','2026-08-13','2026-08-14',
  '2026-09-23','2026-09-24','2026-09-25',
  '2026-11-04','2026-11-05','2026-11-06',
  '2026-12-30','2026-12-31',
  '2027-01-01'
]);
const KYUGYO_KARI = new Set([
  '2026-10-21','2026-10-22','2026-10-23'
]);

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxCmCGOp2UaA6T5_TUGC3pp_ypZCoqbB_5Vf6k0JW4tytijM95t8_8ne8BYONddGq6k/exec';
let records = [];

async function loadFromSheet(){
  try {
    const res = await fetch(GAS_URL);
    records = await res.json();
  } catch(e) {
    console.error('データ読み込みエラー:', e);
  }
}

const NICKNAME = {
  'まるちゃん':'丸子','かなえちゃん':'和','そねちゃん':'曽根原',
  'ちゃこさん':'武田','しーちゃん':'石井','おりちゃん':'折井','おおさん':'大手'
};
function formalName(n){ return NICKNAME[n] || n; }
function getDow(ds){ return ALLDAYS[new Date(ds+'T12:00:00').getDay()]; }
function fmtDate(ds){ const d=new Date(ds+'T12:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function fmtDateSlash(ds){ const d=new Date(ds+'T12:00:00'); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function sorted(){ return [...records].sort((a,b)=>b.num-a.num); }

function creditStr(p){
  const parts=[];
  if(p.source) parts.push('出典：'+p.source);
  if(p.author) parts.push('作：'+p.author);
  if(p.translator) parts.push('訳：'+p.translator);
  if(p.illustrator) parts.push('絵：'+p.illustrator);
  return parts.join('　');
}

function sw(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.navbtn').forEach(el=>el.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  btn.classList.add('on');
  if(v==='srch') renderSrch();
  if(v==='num') renderNum();
  if(v==='cal') renderCal();
  if(v==='top') renderDashboard();
}

let _calYear = new Date().getFullYear();

function initCalYear(){
  const thisYear = new Date().getFullYear();
  if(!_calYear) _calYear = thisYear;
  document.getElementById('cal-year-label').textContent = _calYear;
}

function changeCalYear(diff){
  _calYear += diff;
  document.getElementById('cal-year-label').textContent = _calYear;
  renderCal();
}

// 1ヶ月分のカレンダーHTMLを生成（年間・ダッシュボード共用）
function buildMonthHtml(year, m, byDate){
  const today=new Date(); today.setHours(0,0,0,0);
  const MNAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DNAMES=['月','火','水','木','金','土','日'];
  const firstDow=new Date(year,m,1).getDay();
  const firstDay=firstDow===0?6:firstDow-1;
  const daysInMonth=new Date(year,m+1,0).getDate();
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day blank"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=new Date(year,m,d);
    const dow=dt.getDay();
    const isToday=dt.getTime()===today.getTime();
    const isFuture=dt>today;
    const isPast=dt<today;
    const rec=byDate[ds];
    const numCls=dow===0?'sun':dow===6?'sat':'';

    let cls='cal-day';
    if(isToday) cls+=' today';
    if(rec){ cls+=' has-event'; if(isPast) cls+=' past-done'; }
    else { cls+=' clickable'; }

    const isKyugyo=KYUGYO.has(ds);
    const isKyugyoKari=KYUGYO_KARI.has(ds);
    let bg='';
    if(isKyugyo) bg='background:#fdecea;';
    else if(isKyugyoKari) bg='background:#fff4ec;';
    else if(rec&&isFuture) bg='background:#fff8ee;';
    else if(isPast) bg='background:#f8f4ef;';

    let inner=`<div class="cal-day-num ${numCls}">${d}</div>`;
    if(rec) inner+=`<div class="cal-dot ${isFuture?'future':'done'}"></div><div style="font-size:8px;text-align:center;color:${isFuture?'#8a6020':'#5f5e5a'};margin-top:1px">第${rec.num}回</div>`;
    if(isKyugyo) inner+=`<div class="cal-kyugyo">休業</div>`;
    else if(isKyugyoKari) inner+=`<div class="cal-kyugyo cal-kyugyo-kari">休業(仮)</div>`;

    let handlers='';
    if(rec) handlers=`onmouseenter="showPopup(event,'${ds}')" onmouseleave="hidePopup()" onclick="openEditModal('${ds}')"`;
    else handlers=`onclick="openNewModal('${ds}')"`;

    cells+=`<div class="${cls}" style="${bg}" ${handlers}>${inner}</div>`;
  }
  return `<div class="cal-month">
    <div class="cal-month-head">${MNAMES[m]}</div>
    <div class="cal-dow-row">${DNAMES.map((n,i)=>`<div class="cal-dow-cell${i===6?' sun':i===5?' sat':''}">${n}</div>`).join('')}</div>
    <div class="cal-days">${cells}</div>
  </div>`;
}

function renderCal(){
  const year = _calYear;
  const byDate={};
  records.forEach(r=>{ if(r.date.startsWith(year)) byDate[r.date]=r; });
  let html='<div class="cal-grid">';
  for(let m=0;m<12;m++) html+=buildMonthHtml(year, m, byDate);
  html+='</div>';
  document.getElementById('cal-grid').innerHTML=html;
}

function showPopup(e,dateStr){
  const r=records.find(rec=>rec.date===dateStr);
  if(!r) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const isFuture=new Date(dateStr+'T12:00:00')>today;
  const popup=document.getElementById('cal-popup');
  const hasSessions=(r.progs||[]).some(p=>p.session);
  let progsHtml='';
  if(hasSessions){
    ['前半','後半'].forEach(s=>{
      const sp=(r.progs||[]).filter(p=>p.session===s);
      if(!sp.length) return;
      progsHtml+=`<div class="cal-popup-session">${s}</div>`;
      progsHtml+=sp.map(p=>`<div class="cal-popup-prog">
        <span class="cal-popup-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
        <div class="cal-popup-body"><div class="cal-popup-title" style="${p.tba||p.special?'color:var(--muted);font-style:italic':''}">${p.tba?'（未定）':p.special?'（特別企画）':p.title}</div>
        ${p.reader?`<div class="cal-popup-reader">${p.reader}</div>`:''}</div></div>`).join('');
    });
  } else {
    progsHtml=(r.progs||[]).map(p=>`<div class="cal-popup-prog">
      <span class="cal-popup-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
      <div class="cal-popup-body"><div class="cal-popup-title" style="${p.tba||p.special?'color:var(--muted);font-style:italic':''}">${p.tba?'（未定）':p.special?'（特別企画）':p.title}</div>
      ${p.reader?`<div class="cal-popup-reader">${p.reader}</div>`:''}</div></div>`).join('');
  }
  popup.innerHTML=`<div class="cal-popup-head">第${r.num}回　${fmtDate(dateStr)}（${SHORT[r.dow]}）${r.times?'　'+r.times.join('／'):''}${isFuture?'　<span style="font-size:9px;background:#d5cfc8;color:#5f5e5a;padding:1px 6px;border-radius:10px">未実施</span>':''}</div>${progsHtml}<div class="cal-edit-hint">クリックして編集</div>`;
  popup.classList.add('show');
  const rect=e.target.closest('.cal-day').getBoundingClientRect();
  if(window.innerWidth<=640){
    popup.style.left='16px';
    popup.style.top=Math.max(8,rect.top-10)+'px';
    popup.style.width=(window.innerWidth-32)+'px';
  } else {
    let left=rect.right+8,top=rect.top;
    if(left+300>window.innerWidth) left=rect.left-308;
    if(top+320>window.innerHeight) top=window.innerHeight-328;
    popup.style.left=left+'px';
    popup.style.top=Math.max(8,top)+'px';
    popup.style.width='300px';
  }
}

function hidePopup(){ document.getElementById('cal-popup').classList.remove('show'); }

let progRowId=0;

function openNewModal(dateStr){
  hidePopup();
  _openModal(dateStr,null,null);
}

function openEditModal(dateStr){
  hidePopup();
  const rec=records.find(r=>r.date===dateStr);
  _openModal(dateStr,rec,rec?rec.num:null);
}

function _openModal(dateStr,rec,defaultNum){
  progRowId=0;
  document.getElementById('f-date').value=dateStr;
  document.getElementById('f-num').value=defaultNum||'';
  // 時間帯チェックボックスを復元
  document.querySelectorAll('#f-times-group input[type="checkbox"]').forEach(cb=>cb.checked=false);
  document.getElementById('f-times-custom').value='';
  if(rec&&rec.times){
    const customTimes=[];
    rec.times.forEach(t=>{
      const cb=document.querySelector(`#f-times-group input[value="${t}"]`);
      if(cb) cb.checked=true;
      else customTimes.push(t);
    });
    if(customTimes.length) document.getElementById('f-times-custom').value=customTimes.join('、');
  }
  document.getElementById('modal-title').textContent=rec?`第${rec.num}回 編集`:'新しい記録を入力';
  document.getElementById('btn-delete').style.display=rec?'':'none';
  onDateChange();
  document.getElementById('prog-rows').innerHTML='';
  if(rec&&rec.progs&&rec.progs.length){
    rec.progs.forEach(p=>addProgRow(p));
  } else {
    addProgRow(null);
  }
  document.getElementById('modal-overlay').classList.add('show');
}

function overlayClick(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }

function onDateChange(){
  const ds=document.getElementById('f-date').value;
  const tag=document.getElementById('f-dow-tag');
  if(!ds){ tag.style.display='none'; return; }
  tag.textContent=getDow(ds);
  tag.style.display='';
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function addProgRow(existing){
  progRowId++;
  const id=progRowId;
  const type=existing?.type||'katarite';
  const div=document.createElement('div');
  div.className='prog-row';
  div.id='prow-'+id;
  div.draggable = false;
  div.innerHTML=`
    <div class="prog-drag-handle" title="ドラッグで並び替え">⠿</div>
    <div class="prog-row-body">
    <div class="prog-row-top">
      <select class="prog-type-sel" onchange="updateProgExtra(${id})">
        <option value="katarite"${type==='katarite'?' selected':''}>おはなし</option>
        <option value="ehon"${type==='ehon'?' selected':''}>絵本</option>
        <option value="teasobi"${type==='teasobi'?' selected':''}>てあそび</option>
      </select>
      <select class="prog-session-sel">
        <option value=""${!existing?.session?' selected':''}>（前後半なし）</option>
        <option value="前半"${existing?.session==='前半'?' selected':''}>前半</option>
        <option value="後半"${existing?.session==='後半'?' selected':''}>後半</option>
      </select>
      <button class="prog-remove" onclick="document.getElementById('prow-${id}').remove()">×</button>
    </div>
    <div class="prog-fields">
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="text" class="prog-title" placeholder="タイトル・わらべうた名" value="${esc(existing?.title)}" style="flex:1">
        <button type="button" class="prog-search-btn" onclick="openBookSearch(this)" title="NDLで検索">🔍</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer;">
          <input type="checkbox" class="prog-tba" ${existing?.tba?'checked':''} style="accent-color:var(--brown)"> 未定
        </label>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer;">
          <input type="checkbox" class="prog-special" ${existing?.special?'checked':''} style="accent-color:var(--ehon)"> 特別企画
        </label>
      </div>
      <input type="text" class="prog-reader" list="readers-list" placeholder="話し手（省略可）" value="${esc(existing?.reader)}">
      <div class="prog-extra-grid" id="pextra-${id}">
        <input type="text" class="prog-source" placeholder="出典" value="${esc(existing?.source)}">
        <input type="text" class="prog-author" placeholder="作者" value="${esc(existing?.author)}">
        <input type="text" class="prog-translator" placeholder="訳" value="${esc(existing?.translator)}">
        <input type="text" class="prog-illustrator" placeholder="絵" value="${esc(existing?.illustrator)}">
      </div>
    </div>
    </div>`;
  document.getElementById('prog-rows').appendChild(div);
  updateProgExtra(id);

  // ドラッグ＆ドロップ（ハンドルをつかんだときだけ有効）
  const handle = div.querySelector('.prog-drag-handle');
  handle.addEventListener('mousedown', () => { div.draggable = true; });
  document.addEventListener('mouseup', () => { div.draggable = false; }, { once: false });
  div.addEventListener('dragstart', e => {
    if(!div.draggable) { e.preventDefault(); return; }
    _dragSrc = div;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    setTimeout(() => div.classList.add('dragging'), 0);
  });
  div.addEventListener('dragend', () => {
    div.draggable = false;
    div.classList.remove('dragging');
    _clearDropIndicators();
    _dragSrc = null;
  });
  div.addEventListener('dragover', e => {
    e.preventDefault();
    if(!_dragSrc || _dragSrc === div) return;
    _clearDropIndicators();
    const rect = div.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    if(e.clientY < mid) div.classList.add('drop-above');
    else               div.classList.add('drop-below');
  });
  div.addEventListener('dragleave', () => _clearDropIndicators());
  div.addEventListener('drop', e => {
    e.preventDefault();
    if(!_dragSrc || _dragSrc === div) return;
    const rect = div.getBoundingClientRect();
    const mid = rect.top + rect.height / 2;
    const insertBefore = e.clientY < mid;
    const container = document.getElementById('prog-rows');
    if(insertBefore) container.insertBefore(_dragSrc, div);
    else             container.insertBefore(_dragSrc, div.nextSibling);
    _clearDropIndicators();
  });
}

let _dragSrc = null;
function _clearDropIndicators(){
  document.querySelectorAll('#prog-rows .prog-row').forEach(r => {
    r.classList.remove('drop-above','drop-below');
  });
}

function updateProgExtra(id){
  const row=document.getElementById('prow-'+id);
  if(!row) return;
  const type=row.querySelector('.prog-type-sel').value;
  document.getElementById('pextra-'+id).classList.toggle('hidden',type==='teasobi');
}

async function deleteRecord(){
  const dateStr=document.getElementById('f-date').value;
  if(!dateStr) return;
  if(!confirm(`${dateStr} の記録を削除してもよいですか？`)) return;

  const btn=document.getElementById('btn-delete');
  btn.disabled=true;
  btn.textContent='削除中…';

  try {
    const params = new URLSearchParams({action:'delete', date:dateStr});
    await fetch(GAS_URL + '?' + params.toString());
  } catch(e){
    console.warn('GAS削除失敗:',e);
  }

  const idx=records.findIndex(r=>r.date===dateStr);
  if(idx>=0) records.splice(idx,1);

  closeModal();
  renderAll();
  btn.disabled=false;
  btn.textContent='削除する';
}

async function saveRecord(){
  const dateStr=document.getElementById('f-date').value;
  const num=parseInt(document.getElementById('f-num').value);
  if(!dateStr||isNaN(num)){
    alert('日付と開催回を入力してください');
    return;
  }
  const dow=getDow(dateStr);
  const times=[];
  document.querySelectorAll('#f-times-group input[type="checkbox"]:checked').forEach(cb=>times.push(cb.value));
  const customTime=document.getElementById('f-times-custom').value.trim();
  if(customTime) customTime.split(/[,、]/).forEach(t=>{if(t.trim())times.push(t.trim());});
  const progs=[];
  document.querySelectorAll('#prog-rows .prog-row').forEach(row=>{
    const type=row.querySelector('.prog-type-sel').value;
    const session=row.querySelector('.prog-session-sel').value;
    const title=row.querySelector('.prog-title').value.trim();
    const tba=row.querySelector('.prog-tba').checked;
    const special=row.querySelector('.prog-special').checked;
    if(!title && !tba && !special) return;
    const prog={type,title};
    if(tba) prog.tba=true;
    if(special) prog.special=true;
    if(session) prog.session=session;
    const reader=row.querySelector('.prog-reader').value.trim();
    if(reader) prog.reader=reader;
    if(type!=='teasobi'){
      const source=row.querySelector('.prog-source').value.trim();
      const author=row.querySelector('.prog-author').value.trim();
      const translator=row.querySelector('.prog-translator').value.trim();
      const illustrator=row.querySelector('.prog-illustrator').value.trim();
      if(source) prog.source=source;
      if(author) prog.author=author;
      if(translator) prog.translator=translator;
      if(illustrator) prog.illustrator=illustrator;
    }
    progs.push(prog);
  });

  const record={date:dateStr,num,dow,progs};
  if(times.length) record.times=times;

  const btn=document.getElementById('btn-save');
  btn.disabled=true;
  btn.textContent='保存中…';

  try {
    const params = new URLSearchParams({action:'upsert', data:JSON.stringify(record)});
    await fetch(GAS_URL + '?' + params.toString());
  } catch(e){
    console.warn('GAS保存失敗:',e);
  }

  const idx=records.findIndex(r=>r.date===dateStr);
  if(idx>=0) records[idx]=record;
  else records.push(record);

  closeModal();
  renderAll();
  btn.disabled=false;
  btn.textContent='保存する';
}

// ── TODO ──────────────────────────────────────────────
const TODO_KEY = 'ohanashi-todos';
// 担当者ごとの色
// まるちゃん, かなえちゃん, そねちゃん, ちゃこさん, しーちゃん, おりちゃん, おおさん
const READER_COLORS = ['#e8822a','#e06090','#5bbcd0','#1a3a6b','#7ecb35','#aaaaaa','#f0c030'];
// 顔アイコン画像（画像ファイルがある人だけ指定）
const READER_ICONS = {
  'まるちゃん': 'face-icon_maruchan.png',
  'かなえちゃん': 'face-icon_kanaechan.png',
  'そねちゃん': 'face-icon_sonechan.png',
  'ちゃこさん': 'face-icon_chakosan.png',
  'しーちゃん': 'face-icon_shichan.png',
  'おおさん': 'face-icon_oosan.png'
};

function loadTodos(){ try{ return JSON.parse(localStorage.getItem(TODO_KEY)||'[]'); }catch(e){ return []; } }
function saveTodos(todos){ localStorage.setItem(TODO_KEY, JSON.stringify(todos)); }

function readerColor(name){
  const READERS_LOCAL = ['まるちゃん','かなえちゃん','そねちゃん','ちゃこさん','しーちゃん','おりちゃん','おおさん'];
  const i = READERS_LOCAL.indexOf(name);
  return READER_COLORS[i >= 0 ? i : READER_COLORS.length - 1];
}
function readerInitial(name){ return name ? name[0] : '？'; }

function initTodo(){
  // セレクトボックスにREADERSを追加
  ['todo-assignee','dash-todo-assignee'].forEach(id=>{
    const sel = document.getElementById(id);
    if(!sel) return;
    READERS.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r; opt.textContent = r;
      sel.appendChild(opt);
    });
  });
  renderTodoBar();
  renderTodoList();
}

function toggleTodoPanel(){
  const panel = document.getElementById('todo-panel');
  const btn   = document.getElementById('todo-toggle-btn');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : '';
  btn.classList.toggle('open', !isOpen);
  if(!isOpen) renderTodoList();
}

function renderTodoBar(){
  const today = new Date(); today.setHours(0,0,0,0);
  const todos = loadTodos().filter(t => !t.done);
  const sorted = todos.filter(t => t.due).sort((a,b)=>a.due.localeCompare(b.due));
  const noDue  = todos.filter(t => !t.due);
  const show   = [...sorted, ...noDue].slice(0, 3);

  const bubbles = document.getElementById('todo-bubbles');
  if(!bubbles) return;
  bubbles.innerHTML = '';
  if(!show.length) return;

  show.forEach(t => {
    const dueDate   = t.due ? new Date(t.due+'T00:00:00') : null;
    const isOverdue = dueDate && dueDate < today;
    const isToday   = dueDate && dueDate.getTime() === today.getTime();
    const dueTxt    = t.due ? `<span style="font-size:10px;opacity:0.7;margin-left:4px">${t.due.slice(5).replace('-','/')}</span>` : '';

    // アイコン要素
    const iconSrc = t.assignee && READER_ICONS[t.assignee];
    let iconEl;
    if(iconSrc){
      iconEl = `<img class="todo-bubble-icon" src="${iconSrc}" alt="${t.assignee}">`;
    } else if(t.assignee){
      const color = readerColor(t.assignee);
      const initial = readerInitial(t.assignee);
      iconEl = `<span class="todo-bubble-icon initial" style="background:${color}">${initial}</span>`;
    } else {
      iconEl = '';
    }

    const bub = document.createElement('div');
    bub.className = 'todo-bubble' + (isOverdue?' overdue':isToday?' today':'');
    bub.innerHTML = iconEl + t.text + dueTxt;
    bubbles.appendChild(bub);
  });

  if(todos.length > 3){
    const more = document.createElement('div');
    more.className = 'todo-bubble-more';
    more.textContent = `…他${todos.length - 3}件`;
    bubbles.appendChild(more);
  }
}

function renderTodoList(){
  const today = new Date(); today.setHours(0,0,0,0);
  const todos = loadTodos();
  const list = document.getElementById('todo-list');
  if(!todos.length){ list.innerHTML='<div style="font-size:12px;color:var(--muted);padding:4px 0">タスクはありません</div>'; return; }
  list.innerHTML = '';
  // 未完了→期日昇順、完了は末尾
  const sorted = [
    ...todos.filter(t=>!t.done).sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999')),
    ...todos.filter(t=> t.done)
  ];
  sorted.forEach((t, _) => {
    const idx = todos.indexOf(t);
    const dueDate = t.due ? new Date(t.due+'T00:00:00') : null;
    const isOverdue  = !t.done && dueDate && dueDate < today;
    const isTodayDue = !t.done && dueDate && dueDate.getTime()===today.getTime();
    const item = document.createElement('div');
    item.className = 'todo-item' + (t.done?' done':'') + (isOverdue?' overdue':isTodayDue?' today-due':'');
    const color = t.assignee ? readerColor(t.assignee) : '#ccc';
    const initial = t.assignee ? readerInitial(t.assignee) : '';
    const dueTxt = t.due ? t.due.slice(5).replace('-','/') + (isOverdue?' 期限切れ':isTodayDue?' 今日':'') : '';
    item.innerHTML =
      `<input type="checkbox" ${t.done?'checked':''} onchange="toggleTodoDone(${idx})" style="accent-color:var(--ink);flex-shrink:0">` +
      (t.assignee ? `<span class="todo-assignee-icon" style="background:${color}">${initial}</span>` : '') +
      `<span class="todo-item-text">${t.text}</span>` +
      (dueTxt ? `<span class="todo-item-due">${dueTxt}</span>` : '') +
      `<button class="todo-item-del" onclick="deleteTodo(${idx})" title="削除">×</button>`;
    list.appendChild(item);
  });
}

function addTodo(){
  const text = document.getElementById('todo-text').value.trim();
  if(!text) return;
  const due = document.getElementById('todo-due').value;
  const assignee = document.getElementById('todo-assignee').value;
  const todos = loadTodos();
  todos.push({ text, due, assignee, done: false });
  saveTodos(todos);
  document.getElementById('todo-text').value = '';
  document.getElementById('todo-due').value = '';
  document.getElementById('todo-assignee').value = '';
  renderTodoList();
  renderTodoBar();
}

function toggleTodoDone(idx){
  const todos = loadTodos();
  if(todos[idx]) todos[idx].done = !todos[idx].done;
  saveTodos(todos);
  renderDashTasks();
}

function deleteTodo(idx){
  const todos = loadTodos();
  todos.splice(idx, 1);
  saveTodos(todos);
  renderDashTasks();
}

function renderDashTasks(){
  const today = new Date(); today.setHours(0,0,0,0);
  const todos = loadTodos();
  const el = document.getElementById('dash-task-list');
  if(!el) return;
  const sorted = [
    ...todos.filter(t=>!t.done).sort((a,b)=>(a.due||'9999').localeCompare(b.due||'9999')),
    ...todos.filter(t=>t.done)
  ];
  if(!sorted.length){ el.innerHTML='<div style="font-size:11px;color:var(--muted)">タスクはありません</div>'; return; }
  el.innerHTML = sorted.map((t,i)=>{
    const origIdx = todos.indexOf(t);
    const color = t.assignee ? readerColor(t.assignee) : '#ccc';
    const initial = t.assignee ? readerInitial(t.assignee) : '';
    const iconSrc = t.assignee && READER_ICONS[t.assignee];
    const icon = iconSrc
      ? `<img src="${iconSrc}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      : (t.assignee ? `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${color};font-size:9px;font-weight:700;color:#fff;flex-shrink:0">${initial}</span>` : '');
    const dueTxt = t.due ? `<span style="font-size:10px;color:var(--muted);margin-left:4px">${t.due.slice(5).replace('-','/')}</span>` : '';
    return `<div class="dash-task-item${t.done?' done':''}" onclick="editTodo(event,${origIdx})">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodoDone(${origIdx})" onclick="event.stopPropagation()">
      ${icon}<span>${t.text}</span>${dueTxt}
      <span onclick="event.stopPropagation();deleteTodo(${origIdx})" style="margin-left:auto;cursor:pointer;color:var(--border);font-size:14px;line-height:1" onmouseover="this.style.color='#c0392b'" onmouseout="this.style.color='var(--border)'">×</span>
    </div>`;
  }).join('');
}

function editTodo(e, idx){
  e.stopPropagation();
  const todos = loadTodos();
  const t = todos[idx];
  if(!t) return;
  const el = document.getElementById('dash-task-list');
  // 既存の編集フォームを閉じる
  el.querySelectorAll('.dash-task-edit').forEach(f => f.remove());
  el.querySelectorAll('.dash-task-item').forEach(i => i.style.display='');

  const item = e.currentTarget;
  item.style.display = 'none';

  const assigneeOpts = READERS.map(r =>
    `<option value="${r}" ${r===t.assignee?'selected':''}>${r}</option>`
  ).join('');

  const form = document.createElement('div');
  form.className = 'dash-task-edit';
  form.innerHTML = `
    <input type="text" class="edit-text" value="${t.text.replace(/"/g,'&quot;')}" placeholder="タスク内容">
    <input type="date" class="edit-due" value="${t.due||''}">
    <select class="edit-assignee"><option value="">担当者</option>${assigneeOpts}</select>
    <div class="dash-task-edit-btns">
      <button class="dash-task-edit-save" onclick="saveTodoEdit(${idx})">保存</button>
      <button class="dash-task-edit-cancel" onclick="renderDashTasks()">キャンセル</button>
    </div>
  `;
  item.insertAdjacentElement('afterend', form);
  form.querySelector('.edit-text').focus();
}

function saveTodoEdit(idx){
  const form = document.querySelector('.dash-task-edit');
  if(!form) return;
  const text = form.querySelector('.edit-text').value.trim();
  const due  = form.querySelector('.edit-due').value;
  const assignee = form.querySelector('.edit-assignee').value;
  if(!text) return;
  const todos = loadTodos();
  if(!todos[idx]) return;
  todos[idx].text = text;
  todos[idx].due  = due;
  todos[idx].assignee = assignee;
  saveTodos(todos);
  renderDashTasks();
}

  renderDashTasks();
}

function renderDashProgram(){
  const el = document.getElementById('dash-program-body');
  if(!el) return;
  const today = new Date(); today.setHours(0,0,0,0);
  // 今週（月〜日）の範囲
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today); monday.setDate(today.getDate() - (dow===0?6:dow-1));
  const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const weekRecs = records.filter(r => r.date >= fmt(monday) && r.date <= fmt(sunday));
  if(!weekRecs.length){
    el.innerHTML = '<div style="text-align:center;font-size:12px;color:var(--muted);padding:8px 0">今週の予定はありません</div>';
    return;
  }
  el.innerHTML = weekRecs.map(r=>(r.progs||[]).map(p=>`
    <div class="dash-prog-item">
      <span class="${TYPE_CLASS[p.type]||'badge-k'}" style="font-size:11px;padding:2px 10px;border-radius:10px;display:inline-block;margin-bottom:4px">${TYPE_LABEL[p.type]||p.type}</span>
      <div style="font-size:13px;font-weight:500">${p.tba?'（未定）':p.special?'（特別企画）':p.title}</div>
      ${p.reader?`<div style="font-size:11px;color:var(--brown)">${p.reader}</div>`:''}
    </div>`).join('')).join('');
}

function renderDashMiniCal(){
  const el = document.getElementById('dash-mini-cal-wrap');
  if(!el) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const y = today.getFullYear(), m = today.getMonth();
  const byDate={};
  records.forEach(r=>{ if(r.date.startsWith(y)) byDate[r.date]=r; });
  el.innerHTML = buildMonthHtml(y, m, byDate);
}

function renderDow(){
  document.getElementById('dow-grid').innerHTML=EIGYO.map(d=>{
    const recs=records.filter(r=>r.dow===d).sort((a,b)=>b.num-a.num);
    const byType=t=>recs.flatMap(r=>(r.progs||[]).filter(p=>p.type===t&&!p.tba&&!p.special).map(p=>({...p,date:r.date})));
    const dedup=items=>{
      const seen=new Set();
      return items.filter(p=>{const k=p.date+p.title;return seen.has(k)?false:seen.add(k);});
    };
    const today=new Date(); today.setHours(0,0,0,0);
    const mkList=items=>dedup(items).length
      ?dedup(items).map(p=>{
          const future=new Date(p.date+'T12:00:00')>today;
          return `<div class="dow-title-item" style="${future?'color:var(--border)':''}">${p.title}</div>`;
        }).join('')
      :`<div class="dow-empty">まだなし</div>`;
    const kt=byType('katarite'),et=byType('ehon'),tt=byType('teasobi');
    return `<div class="dow-day-block">
      <div class="dow-day-label">${SHORT[d]}曜日</div>
      <div class="dow-col"><div class="dow-head ${kt.length?'has-k':''}">おはなし</div><div class="dow-body">${mkList(kt)}</div></div>
      <div class="dow-col"><div class="dow-head ${et.length?'has-e':''}">絵本</div><div class="dow-body">${mkList(et)}</div></div>
      <div class="dow-col"><div class="dow-head ${tt.length?'has-t':''}">てあそび</div><div class="dow-body">${mkList(tt)}</div></div>
    </div>`;
  }).join('');
}

function renderNum(){
  const dow=document.getElementById('num-dow').value;
  const type=document.getElementById('num-type').value;
  let list=sorted().filter(r=>!dow||r.dow===dow);
  if(type) list=list.filter(r=>(r.progs||[]).some(p=>p.type===type));
  const el=document.getElementById('num-list');
  if(!list.length){el.innerHTML='<div class="empty">該当する記録がありません</div>';return;}
  const today=new Date(); today.setHours(0,0,0,0);
  el.innerHTML=list.map(r=>{
    const isFuture=new Date(r.date+'T12:00:00')>today;
    const progs=type?(r.progs||[]).filter(p=>p.type===type):(r.progs||[]);
    const hasSessions=progs.some(p=>p.session);
    const mkProg=p=>`<div class="num-prog">
      <span class="num-prog-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
      <div class="num-prog-body">
        <div class="num-prog-title" style="${p.tba||p.special?'color:var(--muted);font-style:italic':''}">
          ${p.tba?'（未定）':p.special?'（特別企画）':p.title}
        </div>
        ${!p.tba&&!p.special&&p.type!=='teasobi'&&creditStr(p)?`<div class="num-prog-credit">${creditStr(p)}</div>`:''}
        ${p.reader?`<div class="num-prog-reader">${p.reader}</div>`:''}
      </div></div>`;
    let progsHtml='';
    if(hasSessions){
      ['前半','後半'].forEach(s=>{
        const sp=progs.filter(p=>p.session===s);
        if(!sp.length) return;
        progsHtml+=`<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--border)">${s}</div>`;
        progsHtml+=sp.map(mkProg).join('');
      });
    } else {
      progsHtml=progs.map(mkProg).join('');
    }
    return `<div class="num-item" id="rec-${r.date}">
      <div class="num-head" style="${isFuture?'background:#faeeda':'background:#d5cfc8'}">
        <span class="num-badge">第${r.num}回</span>
        <span class="num-date">${fmtDate(r.date)}</span>
        <span class="num-dow">${SHORT[r.dow]}曜日</span>
        ${r.times?`<span style="font-size:11px;color:var(--muted)">${r.times.join('　')}</span>`:''}
        ${isFuture?'<span style="font-size:11px;color:#633806;font-style:italic">実施予定</span>':''}
      </div>
      <div class="num-body">${progsHtml}</div>
    </div>`;
  }).join('');
}

function hl(t,q){if(!q||!t) return t||'';return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="hl">${m}</span>`);}

function renderSrch(){
  const q=document.getElementById('srch-q').value.trim().toLowerCase();
  const dow=document.getElementById('srch-dow').value;
  const type=document.getElementById('srch-type').value;
  const rows=[];
  sorted().forEach(r=>{
    if(dow&&r.dow!==dow) return;
    const seen=new Set();
    (r.progs||[]).forEach(p=>{
      const key=`${r.date}|${p.type}|${p.title}`;
      if(seen.has(key)) return;
      seen.add(key);
      if(type&&p.type!==type) return;
      if(q&&!`${p.title} ${p.author||''} ${p.translator||''} ${p.illustrator||''} ${p.reader||''} ${p.source||''} ${formalName(p.reader||'')}`.toLowerCase().includes(q)) return;
      rows.push({r,p});
    });
  });
  document.getElementById('srch-label').textContent=`${rows.length}件`;
  const el=document.getElementById('srch-list');
  if(!rows.length){el.innerHTML=`<tr><td colspan="10" class="empty">見つかりませんでした</td></tr>`;return;}
  const today=new Date(); today.setHours(0,0,0,0);
  el.innerHTML=rows.map(({r,p})=>{
    const isFuture=new Date(r.date+'T12:00:00')>today;
    return `<tr${isFuture?' style="opacity:0.6"':''}>
      <td class="tbl-num">${r.num}</td>
      <td class="tbl-date">${fmtDateSlash(r.date)}</td>
      <td class="tbl-date">${SHORT[r.dow]}</td>
      <td><span class="prog-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span></td>
      <td class="tbl-title">${hl(p.title,q)}</td>
      <td class="tbl-credit">${hl(p.source||'',q)}</td>
      <td class="tbl-credit">${hl(p.author||'',q)}</td>
      <td class="tbl-credit">${hl(p.translator||'',q)}</td>
      <td class="tbl-credit">${hl(p.illustrator||'',q)}</td>
      <td class="tbl-reader">${p.reader?hl(formalName(p.reader),q):''}</td>
    </tr>`;
  }).join('');
}

// ── 書籍検索（NDL・別タブ） ──
function openBookSearch(btn){
  const row = btn.closest('.prog-row');
  if(!row) return;
  const title = row.querySelector('.prog-title').value.trim();
  const q = encodeURIComponent((title ? title + ' ' : '') + '福音館書店');
  window.open(`https://www.google.com/search?q=${q}`, '_blank');
}

document.getElementById('cal-grid').innerHTML='<div class="empty">データを読み込み中…</div>';

loadFromSheet().then(()=>{
  renderAll();
}).catch(()=>{
  renderAll();
});
initTodo();
</script>
