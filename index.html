<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はらぺこ文庫 おはなしの時間</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #2a2118;
  --paper: #faf7f2;
  --paper2: #f3ede3;
  --sage: #7a9e7e;
  --sage-light: #e8f0e8;
  --brown: #8b6f47;
  --brown-light: #f0e8dc;
  --cream: #fffdf9;
  --muted: #9a8f82;
  --border: #ddd5c8;
  --ehon: #5b7fa6;
  --ehon-light: #e8eef5;
  --teasobi: #c07a2a;
  --teasobi-light: #fef3e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

.header { background: var(--cream); border-bottom: 1px solid var(--border); padding: 1.25rem 1.5rem; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
.header-title { font-family: 'Zen Kurenaido', serif; font-size: 22px; color: var(--ink); letter-spacing: 0.05em; }
.header-sub { font-size: 12px; color: var(--muted); }
.header-count { font-size: 12px; color: var(--muted); margin-left: auto; }

.nav { display: flex; gap: 4px; padding: 0.75rem 1.5rem; background: var(--cream); border-bottom: 1px solid var(--border); overflow-x: auto; }
.navbtn { padding: 5px 16px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.navbtn:hover { background: var(--paper2); color: var(--ink); }
.navbtn.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }

.main { padding: 1.25rem 1.5rem; max-width: 900px; margin: 0 auto; }
.view { display: none; }
.view.on { display: block; }

/* 曜日ビュー */
.dow-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
.dow-day-block { display: flex; flex-direction: column; gap: 10px; }
.dow-day-label { font-family: 'Zen Kurenaido', serif; font-size: 16px; color: var(--ink); padding-bottom: 6px; border-bottom: 2px solid var(--border); margin-bottom: 2px; }
.dow-col { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--cream); }
.dow-head { padding: 7px 12px; font-size: 11px; font-weight: 500; background: var(--paper2); color: var(--muted); border-bottom: 1px solid var(--border); }
.dow-head.has-k { background: var(--sage-light); color: #3d6b41; }
.dow-head.has-e { background: var(--ehon-light); color: #2d5a8a; }
.dow-head.has-t { background: var(--teasobi-light); color: #8a4f10; }
.dow-body { padding: 6px 10px; }
.dow-title-item { font-size: 12px; color: var(--ink); padding: 5px 0; border-bottom: 1px solid var(--border); line-height: 1.4; }
.dow-title-item:last-child { border-bottom: none; padding-bottom: 0; }
.dow-empty { font-size: 11px; color: var(--border); text-align: center; padding: 12px 0; }

.badge-k { background: var(--sage-light); color: #3d6b41; }
.badge-e { background: var(--ehon-light); color: #2d5a8a; }
.badge-t { background: var(--teasobi-light); color: #8a4f10; }
.prog-badge { display:inline-block; font-size:9px; padding:1px 5px; border-radius:10px; flex-shrink:0; white-space:nowrap; }

/* 回数順 */
.ctrl { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.ctrl select, .ctrl input { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.num-item { border: 1px solid var(--border); border-radius: 10px; background: var(--cream); margin-bottom: 10px; overflow: hidden; }
.num-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--paper2); }
.num-badge { font-family: 'Zen Kurenaido', serif; font-size: 13px; color: var(--brown); background: var(--brown-light); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.num-date { font-size: 13px; color: var(--ink); }
.num-dow { font-size: 11px; color: var(--muted); }
.num-body { padding: 10px 16px; }
.num-prog { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.num-prog:last-child { border-bottom: none; padding-bottom: 0; }
.num-prog-badge { font-size: 10px; padding: 2px 0; border-radius: 10px; flex-shrink: 0; margin-top: 2px; width: 4.5em; text-align: center; display: inline-block; }
.num-prog-title { font-size: 14px; font-weight: 500; color: var(--ink); }
.num-prog-credit { font-size: 12px; color: var(--muted); margin-top: 2px; }
.num-prog-reader { font-size: 12px; color: var(--brown); margin-top: 1px; }

/* テーブル */
.tbl-wrap { overflow-x: auto; }
table.srch-tbl { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
table.srch-tbl th { background: var(--paper2); color: var(--muted); font-weight: 500; font-size: 11px; padding: 7px 10px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
table.srch-tbl td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; background: var(--cream); line-height: 1.5; overflow: hidden; display: table-cell; }
table.srch-tbl tr:hover td { background: var(--paper2); }
.tbl-num { color: var(--brown); font-size: 11px; white-space: nowrap; }
.tbl-date { color: var(--muted); font-size: 11px; white-space: nowrap; }
.tbl-title { font-weight: 500; color: var(--ink); }
.tbl-credit { color: var(--muted); font-size: 11px; }
.tbl-reader { color: var(--brown); font-size: 11px; }
.hl { background: #ffeebb; border-radius: 2px; padding: 0 1px; }
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; }
.reslabel { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

/* カレンダー */
.cal-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
.cal-month { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--cream); }
.cal-month-head { padding: 7px 12px; font-size: 13px; font-weight: 500; color: var(--ink); background: #e8dfd4; border-bottom: 1px solid var(--border); font-family: 'Zen Kurenaido', serif; }
.cal-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--paper2); border-bottom: 1px solid var(--border); }
.cal-dow-cell { text-align: center; font-size: 10px; color: var(--muted); padding: 3px 0; }
.cal-dow-cell.sun { color: #c0392b; }
.cal-dow-cell.sat { color: #2980b9; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day { min-height: 36px; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 3px 2px; position: relative; }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.blank { background: #f8f4ef; }
.cal-day.today .cal-day-num { background: var(--brown); color: #fff; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.cal-day-num { font-size: 10px; color: var(--muted); line-height: 1.6; text-align: center; }
.cal-day-num.sun { color: #c0392b; }
.cal-day-num.sat { color: #2980b9; }
.cal-dot { width: 6px; height: 6px; border-radius: 50%; margin: 2px auto 0; }
.cal-dot.done { background: #b4b2a9; }
.cal-dot.future { background: #e8c87a; }
.cal-day.has-event { cursor: pointer; }
.cal-day.has-event:hover { background: var(--paper2) !important; }
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover { background: #f0f5f0 !important; }
.cal-kyugyo { font-size: 7px; text-align: center; color: #c0392b; font-weight: 500; margin-top: 1px; line-height: 1.2; }
.cal-kyugyo-kari { color: #e07820; }
.cal-popup { display: none; position: fixed; z-index: 1000; background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; width: 300px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); pointer-events: none; }
.cal-popup.show { display: block; }
.cal-popup-head { font-size: 12px; font-weight: 500; color: var(--brown); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
.cal-popup-prog { display: flex; align-items: baseline; gap: 6px; margin-bottom: 5px; }
.cal-popup-prog:last-child { margin-bottom: 0; }
.cal-popup-badge { display: inline-block; font-size: 9px; padding: 1px 0; border-radius: 10px; flex-shrink: 0; width: 4.5em; text-align: center; }
.cal-popup-body { flex: 1; }
.cal-popup-title { font-size: 12px; font-weight: 500; color: var(--ink); }
.cal-popup-reader { font-size: 11px; color: var(--brown); }
.cal-popup-session { font-size: 10px; color: var(--muted); margin: 6px 0 3px; border-top: 0.5px solid var(--border); padding-top: 4px; }
.cal-edit-hint { font-size: 10px; color: var(--muted); margin-top: 8px; padding-top: 6px; border-top: 0.5px solid var(--border); text-align: center; }

/* モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal-box { background: var(--cream); border-radius: 12px; width: min(620px, 100%); max-height: calc(100vh - 48px); overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.22); display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--cream); z-index: 1; }
.modal-header-title { font-family: 'Zen Kurenaido', serif; font-size: 16px; color: var(--ink); }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; }
.modal-close:hover { color: var(--ink); }
.modal-body { padding: 16px 18px; flex: 1; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; padding: 12px 18px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--cream); }
.form-group { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.form-group label { font-size: 12px; color: var(--muted); width: 4em; flex-shrink: 0; }
.form-group input[type="date"],
.form-group input[type="number"],
.form-group input[type="text"] { font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--paper); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.form-group input[type="date"] { width: 10em; }
.form-group input[type="number"] { width: 5em; }
.dow-tag { font-size: 12px; color: var(--brown); background: var(--brown-light); padding: 3px 10px; border-radius: 20px; }
.form-section-head { display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 500; color: var(--ink); margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--border); }
.add-prog-btn { font-size: 12px; padding: 4px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); color: var(--ink); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.add-prog-btn:hover { background: var(--paper2); }
.prog-row { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; background: var(--paper); }
.prog-row-top { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.prog-type-sel, .prog-session-sel { font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; }
.prog-remove { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1; }
.prog-remove:hover { color: #c0392b; }
.prog-fields { display: flex; flex-direction: column; gap: 6px; }
.prog-fields input { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 100%; }
.prog-extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.prog-extra-grid.hidden { display: none; }
.btn-cancel { font-size: 13px; padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.btn-cancel:hover { background: var(--paper2); color: var(--ink); }
.btn-save { font-size: 13px; padding: 8px 20px; border: none; border-radius: 8px; background: var(--ink); color: var(--cream); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
.btn-save:hover { opacity: 0.85; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.save-note { font-size: 11px; color: var(--muted); margin-right: auto; align-self: center; }

/* 時間帯チェックボックス */
.times-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.times-chip { position: relative; }
.times-chip input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
.times-chip label { display: block; font-size: 12px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--paper); color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.times-chip input:checked + label { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.times-custom-input { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--cream); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; width: 5em; }

/* 書籍検索 */
.book-suggestions { margin-top: 4px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--cream); }
.book-suggestion-item { display: block; width: 100%; text-align: left; padding: 7px 10px; font-size: 11px; color: var(--ink); background: none; border: none; border-bottom: 1px solid var(--border); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; line-height: 1.4; }
.book-suggestion-item:last-child { border-bottom: none; }
.book-suggestion-item:hover { background: var(--paper2); }
.book-searching { font-size: 10px; color: var(--muted); margin-top: 3px; }

.footer { text-align: center; padding: 2rem; font-size: 11px; color: var(--border); }

@media (max-width: 640px) {
  .header { padding: 0.75rem 1rem; }
  .header-title { font-size: 17px; }
  .nav { padding: 0.5rem 0.75rem; gap: 6px; }
  .navbtn { padding: 5px 10px; font-size: 11px; }
  .main { padding: 0.75rem 0.75rem; }
  .dow-grid { grid-template-columns: 1fr; gap: 20px; }
  .num-head { flex-wrap: wrap; gap: 4px; }
  .num-badge { font-size: 11px; }
  .num-date { font-size: 12px; }
  .cal-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
  .cal-month-head { font-size: 12px; padding: 5px 8px; }
  .cal-day { min-height: 28px; }
  .cal-day-num { font-size: 9px; }
  .cal-popup { width: calc(100vw - 32px); left: 16px !important; }
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.srch-tbl { font-size: 11px; table-layout: auto; }
  table.srch-tbl th, table.srch-tbl td { padding: 5px 6px; }
  .ctrl { gap: 6px; }
  .ctrl select, .ctrl input { font-size: 12px; padding: 5px 8px; }
  .prog-extra-grid { grid-template-columns: 1fr; }
  .save-note { display: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">はらぺこ文庫　おはなしの時間</div>
  <div class="header-sub">水・木・金曜日開催</div>
  <div class="header-count" id="hcount"></div>
</div>

<div class="nav">
  <button class="navbtn on" onclick="sw('cal',this)">年間カレンダー</button>
  <button class="navbtn" onclick="sw('num',this)">開催情報</button>
  <button class="navbtn" onclick="sw('dow',this)">曜日ごと作品</button>
  <button class="navbtn" onclick="sw('srch',this)">データ一覧／検索</button>
</div>

<div class="main">

  <!-- 曜日ビュー -->
  <div class="view" id="v-dow">
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--border)"></span>グレーのタイトルは実施予定
    </div>
    <div class="dow-grid" id="dow-grid"></div>
  </div>

  <!-- 回数順 -->
  <div class="view" id="v-num">
    <div class="ctrl">
      <select id="num-dow" onchange="renderNum()">
        <option value="">曜日：すべて</option>
        <option>水曜日</option><option>木曜日</option><option>金曜日</option>
      </select>
      <select id="num-type" onchange="renderNum()">
        <option value="">種別：すべて</option>
        <option value="katarite">おはなし</option>
        <option value="ehon">絵本</option>
        <option value="teasobi">てあそび</option>
      </select>
    </div>
    <div id="num-list"></div>
  </div>

  <!-- テーブルビュー -->
  <div class="view" id="v-srch">
    <div class="ctrl">
      <input type="text" id="srch-q" placeholder="タイトル・作者・話し手で検索…" oninput="renderSrch()" style="flex:1;min-width:200px">
      <select id="srch-dow" onchange="renderSrch()">
        <option value="">曜日：すべて</option>
        <option>水曜日</option><option>木曜日</option><option>金曜日</option>
      </select>
      <select id="srch-type" onchange="renderSrch()">
        <option value="">種別：すべて</option>
        <option value="katarite">おはなし</option>
        <option value="ehon">絵本</option>
        <option value="teasobi">てあそび</option>
      </select>
    </div>
    <div id="srch-label" class="reslabel"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">※「話し手」は漢字名でもプレクラネームでも検索できます</div>
    <div class="tbl-wrap">
      <table class="srch-tbl">
        <thead>
          <tr>
            <th style="width:3em">回</th>
            <th style="width:7em">日付</th>
            <th style="width:4em">曜日</th>
            <th style="width:7em">種別</th>
            <th style="width:25%">タイトル</th>
            <th style="width:10%">出典</th>
            <th style="width:10%">作者</th>
            <th style="width:10%">訳・編</th>
            <th style="width:10%">絵</th>
            <th style="width:6em">話し手</th>
          </tr>
        </thead>
        <tbody id="srch-list"></tbody>
      </table>
    </div>
  </div>

  <!-- 年間カレンダー -->
  <div class="view on" id="v-cal">
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--sage-light);border:1px solid #aac;"></span>水・木・金曜日をクリックして記録を入力・編集できます
    </div>
    <div class="ctrl" style="margin-bottom:1rem">
      <select id="cal-year" onchange="renderCal()"></select>
    </div>
    <div id="cal-grid"></div>
  </div>

</div>

<div class="footer">はらぺこ文庫 おはなしの時間 記録</div>
<div class="cal-popup" id="cal-popup"></div>
<datalist id="readers-list">
  <option value="まるちゃん">
  <option value="かなえちゃん">
  <option value="そねちゃん">
  <option value="ちゃこさん">
  <option value="しーちゃん">
  <option value="おりちゃん">
  <option value="おおさん">
</datalist>

<!-- 入力モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-header-title" id="modal-title">記録を入力</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>日付</label>
        <input type="date" id="f-date" onchange="onDateChange()">
        <span class="dow-tag" id="f-dow-tag" style="display:none"></span>
      </div>
      <div class="form-group">
        <label>開催回</label>
        <input type="number" id="f-num" min="1" placeholder="回数を入力">
        <span style="font-size:12px;color:var(--muted)">回</span>
      </div>
      <div class="form-group" style="align-items:flex-start">
        <label style="padding-top:5px">時間帯</label>
        <div class="times-chips" id="f-times-group">
          <span class="times-chip"><input type="checkbox" id="tc1" value="10:00"><label for="tc1">10:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc2" value="15:00"><label for="tc2">15:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc3" value="17:00"><label for="tc3">17:00</label></span>
          <span class="times-chip"><input type="checkbox" id="tc4" value="17:45"><label for="tc4">17:45</label></span>
          <span class="times-chip"><input type="checkbox" id="tc5" value="18:00"><label for="tc5">18:00</label></span>
          <input type="text" class="times-custom-input" id="f-times-custom" placeholder="その他">
        </div>
      </div>
      <div class="form-section-head">
        プログラム
        <button class="add-prog-btn" onclick="addProgRow(null)">＋ 追加</button>
      </div>
      <div id="prog-rows"></div>
    </div>
    <div class="modal-footer">
      <span class="save-note">※ スプレッドシートにも保存されます</span>
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveRecord()">保存する</button>
    </div>
  </div>
</div>

<script>
const EIGYO = ['水曜日','木曜日','金曜日'];
const ALLDAYS = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const SHORT = {水曜日:'水',木曜日:'木',金曜日:'金'};
const TYPE_LABEL = {katarite:'おはなし', ehon:'絵本', teasobi:'てあそび'};
const TYPE_CLASS = {katarite:'badge-k', ehon:'badge-e', teasobi:'badge-t'};
const EIGYO_DOW = new Set([3, 4, 5]); // 水=3 木=4 金=5
const READERS = ['まるちゃん','かなえちゃん','そねちゃん','ちゃこさん','しーちゃん','おりちゃん','おおさん'];
const KNOWN_TIMES = ['10:00','15:00','17:00','17:45','18:00'];

// 休業日
const KYUGYO = new Set([
  '2026-08-12','2026-08-13','2026-08-14',
  '2026-09-23','2026-09-24','2026-09-25',
  '2026-11-04','2026-11-05','2026-11-06',
  '2026-12-30','2026-12-31',
  '2027-01-01'
]);
const KYUGYO_KARI = new Set([
  '2026-10-21','2026-10-23','2026-10-24'
]);

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwl2v-vdXh4twpKzimRRXumwa7iPeydEmrTtLruwYodpPmx1CwlrtVN0elqz3QYDlJ_/exec';
let records = [];

async function loadFromSheet(){
  try {
    const res = await fetch(GAS_URL);
    records = await res.json();
  } catch(e) {
    console.error('データ読み込みエラー:', e);
  }
}

const NICKNAME = {
  'まるちゃん':'丸子','かなえちゃん':'和','そねちゃん':'曽根原',
  'ちゃこさん':'武田','しーちゃん':'石井','おりちゃん':'折井','おおさん':'大手'
};
function formalName(n){ return NICKNAME[n] || n; }
function getDow(ds){ return ALLDAYS[new Date(ds+'T12:00:00').getDay()]; }
function fmtDate(ds){ const d=new Date(ds+'T12:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; }
function fmtDateSlash(ds){ const d=new Date(ds+'T12:00:00'); return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`; }
function sorted(){ return [...records].sort((a,b)=>b.num-a.num); }

function creditStr(p){
  const parts=[];
  if(p.source) parts.push('出典：'+p.source);
  if(p.author) parts.push('作：'+p.author);
  if(p.translator) parts.push('訳：'+p.translator);
  if(p.illustrator) parts.push('絵：'+p.illustrator);
  return parts.join('　');
}

function sw(v,btn){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.navbtn').forEach(el=>el.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  btn.classList.add('on');
  if(v==='srch') renderSrch();
  if(v==='num') renderNum();
  if(v==='cal') renderCal();
}

function initCalYear(){
  const years=[...new Set(records.map(r=>r.date.slice(0,4)))].sort();
  const thisYear=new Date().getFullYear().toString();
  if(!years.includes(thisYear)) years.push(thisYear);
  const prev=document.getElementById('cal-year').value;
  const sel=document.getElementById('cal-year');
  sel.innerHTML=years.map(y=>`<option>${y}</option>`).join('');
  sel.value=prev&&years.includes(prev)?prev:thisYear;
}

function renderCal(){
  const year=parseInt(document.getElementById('cal-year').value);
  const today=new Date(); today.setHours(0,0,0,0);
  const byDate={};
  records.forEach(r=>{ if(r.date.startsWith(year)) byDate[r.date]=r; });
  const MNAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DNAMES=['月','火','水','木','金','土','日'];
  let html='<div class="cal-grid">';
  for(let m=0;m<12;m++){
    const firstDow=new Date(year,m,1).getDay();
    const firstDay=firstDow===0?6:firstDow-1;
    const daysInMonth=new Date(year,m+1,0).getDate();
    let cells='';
    for(let i=0;i<firstDay;i++) cells+=`<div class="cal-day blank"></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dt=new Date(year,m,d);
      const dow=dt.getDay();
      const isToday=dt.getTime()===today.getTime();
      const isFuture=dt>today;
      const isPast=dt<today;
      const rec=byDate[ds];
      const numCls=dow===0?'sun':dow===6?'sat':'';
      const isEigyo=EIGYO_DOW.has(dow);

      let cls='cal-day';
      if(isToday) cls+=' today';
      if(rec) cls+=' has-event';
      else cls+=' clickable';

      const isKyugyo = KYUGYO.has(ds);
      const isKyugyoKari = KYUGYO_KARI.has(ds);

      let bg='';
      if(isKyugyo) bg='background:#fdecea;';
      else if(isKyugyoKari) bg='background:#fff4ec;';
      else if(rec&&isFuture) bg='background:#fff8ee;';
      else if(isPast) bg='background:#f8f4ef;';

      let inner=`<div class="cal-day-num ${numCls}">${d}</div>`;
      if(rec){
        inner+=`<div class="cal-dot ${isFuture?'future':'done'}"></div><div style="font-size:8px;text-align:center;color:${isFuture?'#8a6020':'#5f5e5a'};margin-top:1px">第${rec.num}回</div>`;
      }
      if(isKyugyo) inner+=`<div class="cal-kyugyo">休業</div>`;
      else if(isKyugyoKari) inner+=`<div class="cal-kyugyo cal-kyugyo-kari">休業(仮)</div>`;

      let handlers='';
      if(rec){
        handlers=`onmouseenter="showPopup(event,'${ds}')" onmouseleave="hidePopup()" onclick="openEditModal('${ds}')"`;
      } else {
        handlers=`onclick="openNewModal('${ds}')"`;
      }

      cells+=`<div class="${cls}" style="${bg}" ${handlers}>${inner}</div>`;
    }
    html+=`<div class="cal-month">
      <div class="cal-month-head">${MNAMES[m]}</div>
      <div class="cal-dow-row">${DNAMES.map((n,i)=>`<div class="cal-dow-cell${i===6?' sun':i===5?' sat':''}">${n}</div>`).join('')}</div>
      <div class="cal-days">${cells}</div>
    </div>`;
  }
  html+='</div>';
  document.getElementById('cal-grid').innerHTML=html;
}

function showPopup(e,dateStr){
  const r=records.find(rec=>rec.date===dateStr);
  if(!r) return;
  const today=new Date(); today.setHours(0,0,0,0);
  const isFuture=new Date(dateStr+'T12:00:00')>today;
  const popup=document.getElementById('cal-popup');
  const hasSessions=(r.progs||[]).some(p=>p.session);
  let progsHtml='';
  if(hasSessions){
    ['前半','後半'].forEach(s=>{
      const sp=(r.progs||[]).filter(p=>p.session===s);
      if(!sp.length) return;
      progsHtml+=`<div class="cal-popup-session">${s}</div>`;
      progsHtml+=sp.map(p=>`<div class="cal-popup-prog">
        <span class="cal-popup-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
        <div class="cal-popup-body"><div class="cal-popup-title">${p.title}</div>
        ${p.reader?`<div class="cal-popup-reader">${p.reader}</div>`:''}</div></div>`).join('');
    });
  } else {
    progsHtml=(r.progs||[]).map(p=>`<div class="cal-popup-prog">
      <span class="cal-popup-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
      <div class="cal-popup-body"><div class="cal-popup-title">${p.title}</div>
      ${p.reader?`<div class="cal-popup-reader">${p.reader}</div>`:''}</div></div>`).join('');
  }
  popup.innerHTML=`<div class="cal-popup-head">第${r.num}回　${fmtDate(dateStr)}（${SHORT[r.dow]}）${r.times?'　'+r.times.join('／'):''}${isFuture?'　<span style="font-size:9px;background:#d5cfc8;color:#5f5e5a;padding:1px 6px;border-radius:10px">未実施</span>':''}</div>${progsHtml}<div class="cal-edit-hint">クリックして編集</div>`;
  popup.classList.add('show');
  const rect=e.target.closest('.cal-day').getBoundingClientRect();
  if(window.innerWidth<=640){
    popup.style.left='16px';
    popup.style.top=Math.max(8,rect.top-10)+'px';
    popup.style.width=(window.innerWidth-32)+'px';
  } else {
    let left=rect.right+8,top=rect.top;
    if(left+300>window.innerWidth) left=rect.left-308;
    if(top+320>window.innerHeight) top=window.innerHeight-328;
    popup.style.left=left+'px';
    popup.style.top=Math.max(8,top)+'px';
    popup.style.width='300px';
  }
}

function hidePopup(){ document.getElementById('cal-popup').classList.remove('show'); }

// ── モーダル ──
let progRowId=0;

function openNewModal(dateStr){
  hidePopup();
  _openModal(dateStr,null,null);
}

function openEditModal(dateStr){
  hidePopup();
  const rec=records.find(r=>r.date===dateStr);
  _openModal(dateStr,rec,rec?rec.num:null);
}

function _openModal(dateStr,rec,defaultNum){
  progRowId=0;
  document.getElementById('f-date').value=dateStr;
  document.getElementById('f-num').value=defaultNum||'';
  // 時間帯チェックボックスを復元
  document.querySelectorAll('#f-times-group input[type="checkbox"]').forEach(cb=>cb.checked=false);
  document.getElementById('f-times-custom').value='';
  if(rec&&rec.times){
    const customTimes=[];
    rec.times.forEach(t=>{
      const cb=document.querySelector(`#f-times-group input[value="${t}"]`);
      if(cb) cb.checked=true;
      else customTimes.push(t);
    });
    if(customTimes.length) document.getElementById('f-times-custom').value=customTimes.join('、');
  }
  document.getElementById('modal-title').textContent=rec?`第${rec.num}回 編集`:'新しい記録を入力';
  onDateChange();
  document.getElementById('prog-rows').innerHTML='';
  if(rec&&rec.progs&&rec.progs.length){
    rec.progs.forEach(p=>addProgRow(p));
  } else {
    addProgRow(null);
  }
  document.getElementById('modal-overlay').classList.add('show');
}

function overlayClick(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }

function onDateChange(){
  const ds=document.getElementById('f-date').value;
  const tag=document.getElementById('f-dow-tag');
  if(!ds){ tag.style.display='none'; return; }
  tag.textContent=getDow(ds);
  tag.style.display='';
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function addProgRow(existing){
  progRowId++;
  const id=progRowId;
  const type=existing?.type||'katarite';
  const div=document.createElement('div');
  div.className='prog-row';
  div.id='prow-'+id;
  div.innerHTML=`
    <div class="prog-row-top">
      <select class="prog-type-sel" onchange="updateProgExtra(${id})">
        <option value="katarite"${type==='katarite'?' selected':''}>おはなし</option>
        <option value="ehon"${type==='ehon'?' selected':''}>絵本</option>
        <option value="teasobi"${type==='teasobi'?' selected':''}>てあそび</option>
      </select>
      <select class="prog-session-sel">
        <option value=""${!existing?.session?' selected':''}>（前後半なし）</option>
        <option value="前半"${existing?.session==='前半'?' selected':''}>前半</option>
        <option value="後半"${existing?.session==='後半'?' selected':''}>後半</option>
      </select>
      <button class="prog-remove" onclick="document.getElementById('prow-${id}').remove()">×</button>
    </div>
    <div class="prog-fields">
      <input type="text" class="prog-title" placeholder="タイトル・わらべうた名" value="${esc(existing?.title)}" oninput="onTitleInput(${id})">
      <div class="book-searching" id="bsearch-${id}" style="display:none">書籍情報を検索中…</div>
      <div class="book-suggestions" id="bsugg-${id}" style="display:none"></div>
      <input type="text" class="prog-reader" list="readers-list" placeholder="話し手（省略可）" value="${esc(existing?.reader)}">
      <div class="prog-extra-grid" id="pextra-${id}">
        <input type="text" class="prog-source" placeholder="出典" value="${esc(existing?.source)}">
        <input type="text" class="prog-author" placeholder="作者" value="${esc(existing?.author)}">
        <input type="text" class="prog-translator" placeholder="訳" value="${esc(existing?.translator)}">
        <input type="text" class="prog-illustrator" placeholder="絵" value="${esc(existing?.illustrator)}">
      </div>
    </div>`;
  document.getElementById('prog-rows').appendChild(div);
  updateProgExtra(id);
}

function updateProgExtra(id){
  const row=document.getElementById('prow-'+id);
  if(!row) return;
  const type=row.querySelector('.prog-type-sel').value;
  document.getElementById('pextra-'+id).classList.toggle('hidden',type==='teasobi');
}

async function saveRecord(){
  const dateStr=document.getElementById('f-date').value;
  const num=parseInt(document.getElementById('f-num').value);
  if(!dateStr||isNaN(num)){
    alert('日付と開催回を入力してください');
    return;
  }
  const dow=getDow(dateStr);
  const times=[];
  document.querySelectorAll('#f-times-group input[type="checkbox"]:checked').forEach(cb=>times.push(cb.value));
  const customTime=document.getElementById('f-times-custom').value.trim();
  if(customTime) customTime.split(/[,、]/).forEach(t=>{if(t.trim())times.push(t.trim());});
  const progs=[];
  document.querySelectorAll('#prog-rows .prog-row').forEach(row=>{
    const type=row.querySelector('.prog-type-sel').value;
    const session=row.querySelector('.prog-session-sel').value;
    const title=row.querySelector('.prog-title').value.trim();
    if(!title) return;
    const prog={type,title};
    if(session) prog.session=session;
    const reader=row.querySelector('.prog-reader').value.trim();
    if(reader) prog.reader=reader;
    if(type!=='teasobi'){
      const source=row.querySelector('.prog-source').value.trim();
      const author=row.querySelector('.prog-author').value.trim();
      const translator=row.querySelector('.prog-translator').value.trim();
      const illustrator=row.querySelector('.prog-illustrator').value.trim();
      if(source) prog.source=source;
      if(author) prog.author=author;
      if(translator) prog.translator=translator;
      if(illustrator) prog.illustrator=illustrator;
    }
    progs.push(prog);
  });

  const record={date:dateStr,num,dow,progs};
  if(times.length) record.times=times;

  const btn=document.getElementById('btn-save');
  btn.disabled=true;
  btn.textContent='保存中…';

  try {
    const params = new URLSearchParams({action:'upsert', data:JSON.stringify(record)});
    await fetch(GAS_URL + '?' + params.toString());
  } catch(e){
    console.warn('GAS保存失敗:',e);
  }

  const idx=records.findIndex(r=>r.date===dateStr);
  if(idx>=0) records[idx]=record;
  else records.push(record);

  closeModal();
  renderAll();
  btn.disabled=false;
  btn.textContent='保存する';
}

function renderAll(){
  const today=new Date(); today.setHours(0,0,0,0);
  document.getElementById('hcount').textContent=`${today.getMonth()+1}月${today.getDate()}日現在`;
  initCalYear();
  renderDow(); renderNum(); renderSrch(); renderCal();
}

function renderDow(){
  document.getElementById('dow-grid').innerHTML=EIGYO.map(d=>{
    const recs=records.filter(r=>r.dow===d).sort((a,b)=>b.num-a.num);
    const byType=t=>recs.flatMap(r=>(r.progs||[]).filter(p=>p.type===t).map(p=>({...p,date:r.date})));
    const dedup=items=>{
      const seen=new Set();
      return items.filter(p=>{const k=p.date+p.title;return seen.has(k)?false:seen.add(k);});
    };
    const today=new Date(); today.setHours(0,0,0,0);
    const mkList=items=>dedup(items).length
      ?dedup(items).map(p=>{
          const future=new Date(p.date+'T12:00:00')>today;
          return `<div class="dow-title-item" style="${future?'color:var(--border)':''}">${p.title}</div>`;
        }).join('')
      :`<div class="dow-empty">まだなし</div>`;
    const kt=byType('katarite'),et=byType('ehon'),tt=byType('teasobi');
    return `<div class="dow-day-block">
      <div class="dow-day-label">${SHORT[d]}曜日</div>
      <div class="dow-col"><div class="dow-head ${kt.length?'has-k':''}">おはなし</div><div class="dow-body">${mkList(kt)}</div></div>
      <div class="dow-col"><div class="dow-head ${et.length?'has-e':''}">絵本</div><div class="dow-body">${mkList(et)}</div></div>
      <div class="dow-col"><div class="dow-head ${tt.length?'has-t':''}">てあそび</div><div class="dow-body">${mkList(tt)}</div></div>
    </div>`;
  }).join('');
}

function renderNum(){
  const dow=document.getElementById('num-dow').value;
  const type=document.getElementById('num-type').value;
  let list=sorted().filter(r=>!dow||r.dow===dow);
  if(type) list=list.filter(r=>(r.progs||[]).some(p=>p.type===type));
  const el=document.getElementById('num-list');
  if(!list.length){el.innerHTML='<div class="empty">該当する記録がありません</div>';return;}
  const today=new Date(); today.setHours(0,0,0,0);
  el.innerHTML=list.map(r=>{
    const isFuture=new Date(r.date+'T12:00:00')>today;
    const progs=type?(r.progs||[]).filter(p=>p.type===type):(r.progs||[]);
    const hasSessions=progs.some(p=>p.session);
    const mkProg=p=>`<div class="num-prog">
      <span class="num-prog-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span>
      <div class="num-prog-body">
        <div class="num-prog-title">${p.title}</div>
        ${p.type!=='teasobi'&&creditStr(p)?`<div class="num-prog-credit">${creditStr(p)}</div>`:''}
        ${p.reader?`<div class="num-prog-reader">${p.reader}</div>`:''}
      </div></div>`;
    let progsHtml='';
    if(hasSessions){
      ['前半','後半'].forEach(s=>{
        const sp=progs.filter(p=>p.session===s);
        if(!sp.length) return;
        progsHtml+=`<div style="font-size:11px;color:var(--muted);margin:8px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--border)">${s}</div>`;
        progsHtml+=sp.map(mkProg).join('');
      });
    } else {
      progsHtml=progs.map(mkProg).join('');
    }
    return `<div class="num-item" id="rec-${r.date}">
      <div class="num-head" style="${isFuture?'background:#faeeda':'background:#d5cfc8'}">
        <span class="num-badge">第${r.num}回</span>
        <span class="num-date">${fmtDate(r.date)}</span>
        <span class="num-dow">${SHORT[r.dow]}曜日</span>
        ${r.times?`<span style="font-size:11px;color:var(--muted)">${r.times.join('　')}</span>`:''}
        ${isFuture?'<span style="font-size:11px;color:#633806;font-style:italic">実施予定</span>':''}
      </div>
      <div class="num-body">${progsHtml}</div>
    </div>`;
  }).join('');
}

function hl(t,q){if(!q||!t) return t||'';return t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<span class="hl">${m}</span>`);}

function renderSrch(){
  const q=document.getElementById('srch-q').value.trim().toLowerCase();
  const dow=document.getElementById('srch-dow').value;
  const type=document.getElementById('srch-type').value;
  const rows=[];
  sorted().forEach(r=>{
    if(dow&&r.dow!==dow) return;
    const seen=new Set();
    (r.progs||[]).forEach(p=>{
      const key=`${r.date}|${p.type}|${p.title}`;
      if(seen.has(key)) return;
      seen.add(key);
      if(type&&p.type!==type) return;
      if(q&&!`${p.title} ${p.author||''} ${p.translator||''} ${p.illustrator||''} ${p.reader||''} ${p.source||''} ${formalName(p.reader||'')}`.toLowerCase().includes(q)) return;
      rows.push({r,p});
    });
  });
  document.getElementById('srch-label').textContent=`${rows.length}件`;
  const el=document.getElementById('srch-list');
  if(!rows.length){el.innerHTML=`<tr><td colspan="10" class="empty">見つかりませんでした</td></tr>`;return;}
  const today=new Date(); today.setHours(0,0,0,0);
  el.innerHTML=rows.map(({r,p})=>{
    const isFuture=new Date(r.date+'T12:00:00')>today;
    return `<tr${isFuture?' style="opacity:0.6"':''}>
      <td class="tbl-num">${r.num}</td>
      <td class="tbl-date">${fmtDateSlash(r.date)}</td>
      <td class="tbl-date">${SHORT[r.dow]}</td>
      <td><span class="prog-badge ${TYPE_CLASS[p.type]||'badge-k'}">${TYPE_LABEL[p.type]||p.type}</span></td>
      <td class="tbl-title">${hl(p.title,q)}</td>
      <td class="tbl-credit">${hl(p.source||'',q)}</td>
      <td class="tbl-credit">${hl(p.author||'',q)}</td>
      <td class="tbl-credit">${hl(p.translator||'',q)}</td>
      <td class="tbl-credit">${hl(p.illustrator||'',q)}</td>
      <td class="tbl-reader">${p.reader?hl(formalName(p.reader),q):''}</td>
    </tr>`;
  }).join('');
}

// ── 書籍自動検索 ──
let bookSearchTimer = null;

function onTitleInput(id){
  clearTimeout(bookSearchTimer);
  const row = document.getElementById('prow-'+id);
  if(!row) return;
  const type = row.querySelector('.prog-type-sel').value;
  const title = row.querySelector('.prog-title').value.trim();
  const sugg = document.getElementById('bsugg-'+id);
  const status = document.getElementById('bsearch-'+id);
  sugg.style.display='none';
  status.style.display='none';
  if(type==='teasobi' || title.length < 2) return;
  bookSearchTimer = setTimeout(()=>searchBook(id, title), 700);
}

async function searchBook(id, title){
  const status = document.getElementById('bsearch-'+id);
  const sugg = document.getElementById('bsugg-'+id);
  if(!status||!sugg) return;
  status.style.display='block';
  sugg.style.display='none';
  try {
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(title)}&langRestrict=ja&maxResults=6&printType=books`);
    const data = await res.json();
    status.style.display='none';
    const items = data.items||[];
    if(!items.length) return;

    // 1件目を自動入力
    fillBookInfo(id, items[0]);

    // 他の候補も表示（違う場合に選び直せるよう）
    sugg._books = items.slice(0,5);
    sugg.innerHTML = '<div style="font-size:10px;color:var(--muted);padding:5px 10px 3px">違う場合は選び直してください：</div>'
      + items.slice(0,5).map((item,i)=>{
        const v = item.volumeInfo||{};
        const authors = (v.authors||[]).join('、');
        return `<button class="book-suggestion-item" onclick="applyBook(${id},${i})" type="button">
          <strong>${v.title||''}</strong>　<span style="color:var(--muted)">${authors}</span></button>`;
      }).join('');
    sugg.style.display='block';
  } catch(e){
    status.style.display='none';
    console.warn('書籍検索エラー:', e);
  }
}

function fillBookInfo(id, item){
  if(!item) return;
  const v = item.volumeInfo||{};
  const row = document.getElementById('prow-'+id);
  if(!row) return;
  const authors = v.authors||[];
  if(authors.length >= 1) row.querySelector('.prog-author').value = authors[0];
  if(authors.length >= 2) row.querySelector('.prog-illustrator').value = authors[1];
  if(authors.length >= 3) row.querySelector('.prog-translator').value = authors[2];
}

function applyBook(id, idx){
  const sugg = document.getElementById('bsugg-'+id);
  const item = sugg._books && sugg._books[idx];
  if(!item) return;
  const v = item.volumeInfo||{};
  const row = document.getElementById('prow-'+id);
  if(v.title) row.querySelector('.prog-title').value = v.title;
  // フィールドをリセットしてから入力
  row.querySelector('.prog-author').value = '';
  row.querySelector('.prog-illustrator').value = '';
  row.querySelector('.prog-translator').value = '';
  fillBookInfo(id, item);
  sugg.style.display='none';
}

document.getElementById('cal-grid').innerHTML='<div class="empty">データを読み込み中…</div>';

loadFromSheet().then(()=>{
  renderAll();
});
</script>
